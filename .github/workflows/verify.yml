name: verify

# Runs the fast (cached) part of the pipeline on every push or PR.
# Downloads aren't run here (PDF corpus isn't committed); this verifies
# the search/audit/chart steps against the committed docs-extracted/
# text corpus and checks headline numbers fall in expected ranges.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip

      - name: Install poppler (for pdftotext)
        run: sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-test scripts (import only — no external network hits)
        run: |
          for f in scripts/*.py; do
            python -m py_compile "$f"
          done
          echo "All scripts compile."

      - name: Run downstream pipeline (search + audit + enrich + chart + verify)
        run: |
          python3 scripts/search_pdfs_for_lead_paint.py
          python3 scripts/summarize_portfolio.py
          python3 scripts/enrich_audit.py
          python3 scripts/plot_by_region.py
          python3 scripts/verify_pipeline.py

      - name: Upload chart artefact
        uses: actions/upload-artifact@v4
        with:
          name: projects_by_region
          path: outputs/audit/projects_by_region.*
          if-no-files-found: error
